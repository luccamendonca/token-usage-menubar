name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos-arm64:
    name: Build (macOS Apple Silicon)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Host architecture
        run: uname -m

      - name: Build release
        run: swift build -c release

      - name: Package binary
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          test "$(uname -m)" = "arm64"
          BIN_DIR="$(swift build -c release --show-bin-path)"
          BIN_SRC="${BIN_DIR}/TokenUsageMenubar"
          test -x "$BIN_SRC"
          VERSION="${TAG#v}"
          ASSET_BASE="token-usage-menubar-${VERSION}-macos-arm64"
          cp "$BIN_SRC" token-usage-menubar
          chmod +x token-usage-menubar
          zip -9 "${ASSET_BASE}.zip" token-usage-menubar
          shasum -a 256 "${ASSET_BASE}.zip" | tee "${ASSET_BASE}.zip.sha256"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            token-usage-menubar-*-macos-arm64.zip
            token-usage-menubar-*-macos-arm64.zip.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
